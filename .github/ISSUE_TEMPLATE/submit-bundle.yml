name: Submit a Bundle
description: Add a curated bundle (set of skills) — validated and published automatically
title: "Bundle: <your-bundle-name>"
labels: ["bundle-submission"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🤖 Automatic submission
        Fill out this form → bot validates your bundle → if it passes, it's **immediately published**. No manual review needed.

        All skills in the bundle must already exist in the marketplace.
        Browse available skills: `pg marketplace`

  - type: input
    id: bundle_id
    attributes:
      label: Bundle ID
      description: "Lowercase, digits, hyphens only. This is what users type: `install bundle <id>`"
      placeholder: my-bundle-name
    validations:
      required: true

  - type: input
    id: bundle_name
    attributes:
      label: Display name
      description: Human-readable name shown in the marketplace
      placeholder: "My Bundle Name"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does this bundle cover? Who should use it? (min 15 chars)
      placeholder: "Complete workflow for backend engineers — debug, refactor, test, and commit with confidence."
    validations:
      required: true

  - type: textarea
    id: skills
    attributes:
      label: Skill IDs (one per line)
      description: "Must be existing skill IDs from the registry. At least 2 required. Check available IDs at https://github.com/NeiP4n/promptgraph-registry/blob/master/registry.json"
      placeholder: |
        systematic-debugging
        safe-refactor
        tdd-workflow
        commit-message
    validations:
      required: true

  - type: textarea
    id: tags
    attributes:
      label: Tags (comma-separated)
      placeholder: "engineering, workflow, starter"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-flight checklist
      options:
        - label: All listed skills exist in the registry (verified in registry.json)
          required: true
        - label: Bundle has at least 2 skills
          required: true
        - label: Description is at least 15 characters
          required: true
        - label: Bundle ID uses only lowercase letters, digits, and hyphens
          required: true
