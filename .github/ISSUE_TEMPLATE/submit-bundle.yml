name: Submit a Bundle
description: Add a curated bundle (set of skills) to the PromptGraph marketplace
title: "Bundle: <your-bundle-name>"
labels: ["bundle-submission"]
body:
  - type: markdown
    attributes:
      value: |
        ## Submit a Bundle

        A bundle is a curated set of 2+ skills that work well together.
        All skills in the bundle must already be in the registry.

        Create your bundle definition:
        ```json
        {
          "id": "my-bundle",
          "name": "My Bundle",
          "description": "What this bundle does and who it helps (min 15 chars)",
          "skills": ["skill-id-1", "skill-id-2", "skill-id-3"],
          "tags": ["engineering", "workflow"]
        }
        ```

        Or publish via PromptGraph:
        ```
        /pg-publish bundle.json
        ```

  - type: input
    id: bundle_id
    attributes:
      label: Bundle ID
      description: "Lowercase, hyphens only (e.g. backend-engineer)"
      placeholder: my-bundle-name
    validations:
      required: true

  - type: input
    id: bundle_name
    attributes:
      label: Display name
      description: Human-readable name shown in marketplace
      placeholder: "My Bundle Name"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What does this bundle do? Who is it for?
      placeholder: "Complete workflow for X — includes Y, Z, and W."
    validations:
      required: true

  - type: textarea
    id: skills
    attributes:
      label: Skill IDs (one per line)
      description: Must be existing skill IDs from the registry. At least 2 required.
      placeholder: |
        systematic-debugging
        safe-refactor
        tdd-workflow
        commit-message
    validations:
      required: true

  - type: textarea
    id: tags
    attributes:
      label: Tags (comma-separated)
      placeholder: "engineering, workflow, starter"
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Why these skills together?
      description: Briefly explain why this combination is useful
      placeholder: "These skills cover the full code quality loop: write tests first, refactor safely, review properly, commit clearly."
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: All listed skills exist in the registry
          required: true
        - label: Bundle has at least 2 skills
          required: true
        - label: Description is at least 15 characters
          required: true
        - label: Bundle ID uses only lowercase letters, digits, and hyphens
          required: true
