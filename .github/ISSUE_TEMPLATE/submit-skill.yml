name: Submit a Skill
description: Add your skill to the PromptGraph marketplace
title: "Skill: <your-skill-name>"
labels: ["skill-submission"]
body:
  - type: markdown
    attributes:
      value: |
        ## Submit a Skill

        Create your skill file first:
        ```bash
        # Install PromptGraph
        npm install -g promptgraph-mcp

        # Validate your skill locally
        pg validate my-skill.md

        # Publish (creates Gist + registry issue link)
        /pg-publish my-skill.md
        ```
        Then fill out this form.

  - type: input
    id: skill_name
    attributes:
      label: Skill name
      description: "Lowercase, hyphens only (e.g. systematic-debugging)"
      placeholder: my-skill-name
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: One sentence — what does this skill do and when should someone use it?
      placeholder: "Helps you X when Y by doing Z."
    validations:
      required: true

  - type: input
    id: gist_url
    attributes:
      label: Gist URL (or raw GitHub URL)
      description: "Public Gist or raw.githubusercontent.com URL to your skill .md file"
      placeholder: "https://gist.github.com/yourname/abc123 or https://raw.githubusercontent.com/..."
    validations:
      required: true

  - type: textarea
    id: tags
    attributes:
      label: Tags (comma-separated)
      description: "3-6 tags from: engineering, debugging, testing, security, product, planning, research, productivity, ai, workflow, documentation, git, refactoring, architecture, api"
      placeholder: "engineering, debugging, workflow"
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: My skill has `name` and `description` in frontmatter
          required: true
        - label: The skill body is at least 200 characters of real instructions
          required: true
        - label: No dangerous patterns (curl|sh, rm -rf, prompt injection, hardcoded keys)
          required: true
        - label: I ran `pg validate my-skill.md` and it passed
          required: true
        - label: The Gist/URL is publicly accessible
          required: true
