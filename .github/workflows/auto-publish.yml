name: Auto Publish Skill or Bundle

on:
  issues:
    types: [opened, reopened, labeled]

jobs:
  process:
    # External contributors cannot add labels (GitHub restricts this to users with
    # triage/write access), so gate on the issue title prefix instead. pg emits
    # "Bundle: <name>" / "Skill: <name>" titles. Labels still work for maintainers.
    if: |
      startsWith(github.event.issue.title, 'Bundle:') ||
      startsWith(github.event.issue.title, 'Skill:') ||
      contains(github.event.issue.labels.*.name, 'skill-submission') ||
      contains(github.event.issue.labels.*.name, 'bundle-submission') ||
      github.event.label.name == 'skill-submission' ||
      github.event.label.name == 'bundle-submission'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Process submission
        id: process
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
        run: node .github/scripts/process-submission.mjs
