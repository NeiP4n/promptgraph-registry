name: Validate Skills

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'registry.json'
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install gray-matter
      - run: node validate.mjs
